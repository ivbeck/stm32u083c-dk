
[build]
target = "thumbv6m-none-eabi" # CHANGE THIS. Your current one is wrong.

[env]
DEFMT_LOG = "trace"


[target.thumbv6m-none-eabi]
rustflags = [
    "-C",
    "link-arg=-Tlink.x",  # This pulls in memory.x
    "-C",
    "link-arg=-Tdefmt.x", # This fixes your "no .defmt section" error
]

[target.'cfg(all(target_arch = "arm", target_os = "none"))']
runner = "probe-rs run --chip STM32U083MC"
